<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111215">
        <animate attributeName="stop-color" values="#111215;#1a1b26;#111215" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#181926">
        <animate attributeName="stop-color" values="#181926;#1e1f2e;#181926" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1e1f2e">
        <animate attributeName="stop-color" values="#1e1f2e;#242538;#1e1f2e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blur-circle">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="720" height="300" fill="url(#bg)"/>

  <circle cx="580" cy="50" r="90" fill="#89b4fa" opacity="0.06" filter="url(#blur-circle)">
    <animate attributeName="r" values="90;120;90" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="580;600;580" dur="12s" repeatCount="indefinite"/>
  </circle>

  <circle cx="140" cy="250" r="70" fill="#89b4fa" opacity="0.04" filter="url(#blur-circle)">
    <animate attributeName="r" values="70;95;70" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;240;250" dur="11s" repeatCount="indefinite"/>
  </circle>

  <circle cx="650" cy="260" r="50" fill="#a6e3a1" opacity="0.04" filter="url(#blur-circle)">
    <animate attributeName="r" values="50;70;50" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g>
    <text x="360" y="75" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="38" fill="#89b4fa" opacity="0" filter="url(#glow)">
      Antergos NeXT
      <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <animate attributeName="y" from="110" to="75" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.34 1.56 0.64 1"/>
    </text>

    <line x1="360" y1="90" x2="360" y2="90" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1s" fill="freeze"/>
      <animate attributeName="x1" from="360" to="245" dur="0.6s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <animate attributeName="x2" from="360" to="475" dur="0.6s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </line>
  </g>

  <text x="360" y="120" text-anchor="middle" font-family="monospace" font-size="15" fill="#a6adc8" opacity="0">
    Not just a revival — a modernization.
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.3s" fill="freeze"/>
    <animate attributeName="y" from="130" to="120" dur="0.8s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </text>

  <text x="360" y="150" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086" opacity="0">
    An independent continuation of the Antergos Linux distribution.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze"/>
    <animate attributeName="y" from="158" to="150" dur="0.6s" begin="1.8s" fill="freeze"/>
  </text>

  <text x="360" y="172" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086" opacity="0">
    We fix what broke, adopt what's new, and leave what's past in the past.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.2s" fill="freeze"/>
    <animate attributeName="y" from="180" to="172" dur="0.6s" begin="2.2s" fill="freeze"/>
  </text>

  <text x="360" y="194" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086" opacity="0">
    This is not a museum piece — Antergos NeXT is a living project that evolves.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.6s" fill="freeze"/>
    <animate attributeName="y" from="202" to="194" dur="0.6s" begin="2.6s" fill="freeze"/>
  </text>

  <line x1="310" y1="220" x2="410" y2="220" stroke="#313244" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.2s" fill="freeze"/>
    <animate attributeName="x1" from="360" to="310" dur="0.5s" begin="3.2s" fill="freeze"/>
    <animate attributeName="x2" from="360" to="410" dur="0.5s" begin="3.2s" fill="freeze"/>
  </line>

  <text x="360" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#585b70" opacity="0">
    Artix Linux · Calamares Installer · KDE Plasma Desktop · OpenRC
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="3.5s" fill="freeze"/>
  </text>

  <text x="360" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#585b70" opacity="0">
    offline + online install · CI-built package repo · Antergos branding
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="3.8s" fill="freeze"/>
  </text>

  <circle cx="330" cy="282" r="3" fill="#89b4fa" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.3s" begin="4.2s" fill="freeze"/>
    <animate attributeName="r" values="0;3" dur="0.3s" begin="4.2s" fill="freeze"/>
  </circle>
  <circle cx="360" cy="282" r="3" fill="#a6e3a1" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.3s" begin="4.4s" fill="freeze"/>
    <animate attributeName="r" values="0;3" dur="0.3s" begin="4.4s" fill="freeze"/>
  </circle>
  <circle cx="390" cy="282" r="3" fill="#89b4fa" opacity="0">
    <animate attributeName="opacity" values="0;0.4" dur="0.3s" begin="4.6s" fill="freeze"/>
    <animate attributeName="r" values="0;3" dur="0.3s" begin="4.6s" fill="freeze"/>
  </circle>

  <circle cx="330" cy="282" r="3" fill="none" stroke="#89b4fa" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.2s" begin="4.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;8" dur="1.2s" begin="4.8s" repeatCount="indefinite"/>
  </circle>
</svg>
