<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300">
  <rect width="720" height="300" fill="#111215"/>

  <text x="360" y="70" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="36" fill="#89b4fa" opacity="0">
    Antergos NeXT
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze"/>
    <animate attributeName="y" from="90" to="70" dur="1s" fill="freeze"/>
  </text>

  <text x="360" y="105" text-anchor="middle" font-family="monospace" font-size="15" fill="#6c7086" opacity="0">
    Not just a revival — a modernization.
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.5s" fill="freeze"/>
  </text>

  <text x="360" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#585b70" opacity="0">
    An independent continuation of the Antergos Linux distribution.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1s" fill="freeze"/>
  </text>

  <text x="360" y="170" text-anchor="middle" font-family="monospace" font-size="12" fill="#585b70" opacity="0">
    We fix what broke, adopt what's new, and leave what's past in the past.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.3s" fill="freeze"/>
  </text>

  <text x="360" y="195" text-anchor="middle" font-family="monospace" font-size="12" fill="#585b70" opacity="0">
    This is not a museum piece — Antergos NeXT is a living project that evolves.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.6s" fill="freeze"/>
  </text>

  <text x="360" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#45475a" opacity="0">
    Arch Linux · Cnchi Installer · GNOME Desktop · GTK4 · Calamares (experimental)
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2s" fill="freeze"/>
  </text>

  <text x="360" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#45475a" opacity="0">
    Channel 666 easter egg · CI-built package repo · Antergos NeXT memes
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.3s" fill="freeze"/>
  </text>
</svg>
